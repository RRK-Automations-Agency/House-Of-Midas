<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Midas</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg, #090704 0%, #000 100%);width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.3;}

#sprinkle-canvas{position:fixed;inset:0;pointer-events:none;z-index:150;}

#preloader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:#000;perspective:1200px;}

.logo-wrap{position:relative;z-index:2;transform-style:preserve-3d;border-radius:50%;}

.hom-svg{width:clamp(170px,24vw,320px);height:auto;opacity:0;transform:translateY(60px) translateZ(-400px) rotateX(45deg) scale(.8);will-change:transform,opacity;}
.hom-svg .cls-1{fill:url(#goldGrad);}

.hom-svg.rise{animation:svgRise3D 1.4s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes svgRise3D{
  0%  {opacity:0;transform:translateY(60px) translateZ(-400px) rotateX(55deg) scale(.7);}
  100%{opacity:1;transform:translateY(0) translateZ(0) rotateX(0deg) scale(1);}
}

.hom-svg.bloom{animation:svgBloom3D 1.2s cubic-bezier(.5,0,1,1) forwards;transform-origin:center center;}
@keyframes svgBloom3D{
  0%  {transform:scale(1) translateZ(0) rotateX(0deg);}
  100%{transform:scale(10) translateZ(500px) rotateX(25deg);opacity:0;filter:blur(8px);}
}
.logo-wrap.bloom-fade{animation:wrapFade 1.2s cubic-bezier(.3,0,1,1) forwards;}
@keyframes wrapFade{
  0%  {opacity:1;}
  15% {opacity:.95;}
  100%{opacity:0;}
}

#preloader.out{animation:preOut 0.6s ease forwards;}
@keyframes preOut{to{opacity:0;pointer-events:none;visibility:hidden;filter:blur(10px);}}

#site{position:relative;z-index:1;text-align:center;opacity:0;transform:translateY(15px) scale(.98);transition:opacity 1.2s ease,transform 1.2s cubic-bezier(.16,1,.3,1);filter:blur(5px);}
#site.show{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
#site h1{font-family:'Cormorant SC',serif;font-size:clamp(22px,3vw,44px);font-weight:300;letter-spacing:.35em;color:#e8d4a8;margin-bottom:.6rem;text-shadow:0 0 15px rgba(255,228,140,0.15);}
#site p{font-size:clamp(8px,.9vw,11px);letter-spacing:.6em;color:rgba(201,169,110,.6);font-weight:300;text-transform:uppercase;}
</style>
</head>

<div id="site">
  <h1>HOUSE OF MIDAS</h1>
  <p>Fine Jewellery Collection</p>
</div>

<script>
(function(){
  var logo = document.getElementById('logo');
  var wrap = document.querySelector('.logo-wrap');
  var sc   = document.getElementById('sprinkle-canvas');
  var sx   = sc.getContext('2d');
  var pre  = document.getElementById('preloader');
  var site = document.getElementById('site');

  function resize(){ sc.width=window.innerWidth; sc.height=window.innerHeight; }
  resize(); window.addEventListener('resize', resize);

  function delay(fn,ms){ return setTimeout(fn,ms); }

  /* Premium True 3D Sprinkles */
  function sprinkles(duration, density){
    var alive = true;
    var sparks = [];
    density = density || 1;
    var cx = sc.width / 2;
    var cy = sc.height / 2;

    var iv = setInterval(function(){
      if(!alive) return;
      if(Math.random() > 0.4 * density) return;
      var z = Math.random() * 800; // Z-depth coordinate
      sparks.push({
        x: (Math.random() - 0.5) * sc.width * 1.5,
        y: (Math.random() - 0.5) * sc.height * 1.5,
        z: z,
        vx: (Math.random() - 0.5) * 0.8,
        vy: -0.5 - Math.random() * 1.5,
        vz: 1.5 + Math.random() * 3, // moving towards camera
        baseR: Math.random() * 1.4 + 0.6,
        life: 0,
        max: 90 + Math.floor(Math.random()*60),
        hue: Math.random()
      });
    }, 35);

    setTimeout(function(){ clearInterval(iv); alive=false; }, duration);

    var fov = 400;

    (function draw(){
      if(alive || sparks.length > 0){
        requestAnimationFrame(draw);
      }
      sx.clearRect(0,0,sc.width,sc.height);
      
      // Filter out dead and behind-camera particles
      sparks = sparks.filter(function(s){ return s.life < s.max && s.z > -fov + 10; });
      
      // Sort for back-to-front rendering
      sparks.sort(function(a,b){ return b.z - a.z; });

      sparks.forEach(function(s){
        s.x += s.vx; s.y += s.vy; s.z -= s.vz; s.life++;
        
        var scale = fov / (fov + s.z);
        if(scale < 0) return;
        
        var px = s.x * scale + cx;
        var py = s.y * scale + cy;
        var r = s.baseR * scale;

        var t = s.life / s.max;
        var alpha = (t < .15 ? t/.15 : 1-t) * 0.8 * Math.min(1, scale * 0.9);
        var col = s.hue > 0.55 ? '255,228,140' : '230,190,110';
        
        sx.save();
        sx.globalAlpha = alpha;
        
        // Add glow for particles close to camera
        if(scale > 1.1) {
          sx.shadowBlur = 12 * Math.min(scale, 2);
          sx.shadowColor = 'rgba('+col+',1)';
        }

        sx.strokeStyle = 'rgba('+col+',1)';
        sx.lineWidth = Math.max(r * 0.6, 0.5);
        sx.beginPath(); sx.moveTo(px-r*2,py); sx.lineTo(px+r*2,py); sx.stroke();
        sx.beginPath(); sx.moveTo(px,py-r*2); sx.lineTo(px,py+r*2); sx.stroke();
        
        sx.fillStyle = 'rgba(255,248,210,1)';
        sx.beginPath(); sx.arc(px,py,r*.5,0,6.283); sx.fill();
        sx.restore();
      });
    })();
  }

  /* ── SEQUENCE ── */

  // 1. Rise from abstract 3D depth
  delay(function(){
    logo.classList.add('rise');
    sprinkles(2000, 1.2);
  }, 100);

  // 2. Lock 3D position
  delay(function(){
    logo.classList.remove('rise');
    logo.style.opacity = '1';
    logo.style.transform = 'translateY(0) translateZ(0) rotateX(0deg) scale(1)';
    logo.style.transition = 'none';
  }, 1500);

  // 3. Cinematic bloom triggers early
  delay(function(){
    logo.style.opacity = '';
    logo.style.transform = '';
    logo.style.transition = '';
    logo.classList.add('bloom');
    wrap.classList.add('bloom-fade');
  }, 1600);

  // 4. Ultra-fast snap to the main site name
  delay(function(){
    pre.classList.add('out');
    sprinkles(1800, 0.8);
    delay(function(){ site.classList.add('show'); }, 150);
  }, 2300);

})();
</script>
</body>
