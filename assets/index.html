    <script>
      (function () {
        if (location.pathname.endsWith('/landing-preloader.html')) return;
        var params = new URLSearchParams(location.search);
        if (params.get('preloader_done') === '1') {
          params.delete('preloader_done');
          var next = location.pathname + (params.toString() ? ('?' + params.toString()) : '') + location.hash;
          history.replaceState(null, '', next);
          return;
        }
        location.replace('/landing-preloader.html');
      })();
    </script>
    <script type="module" crossorigin src="./index.js"></script>
    <link rel="stylesheet" crossorigin href="./index.css">
